name: Deploy GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: List repository contents
        run: |
          pwd
          ls -la
          find . -maxdepth 2 | sort

      - name: Prepare Pages build
        run: |
          rm -rf ./.pages_build || true
          mkdir ./.pages_build
          rsync -av --exclude='.git' --exclude='.github' --exclude='.vscode' --exclude='node_modules' ./ ./.pages_build/

      - name: List build contents
        run: |
          echo "Build folder listing:"
          ls -la ./.pages_build
          find ./.pages_build -maxdepth 2 | sort

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v1
        with:
          path: ./.pages_build

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
